<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Maps Banner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: transparent; }

  #banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #2d5a3d;
    color: #e8f0e3;
    padding: 13px 20px;
    text-decoration: none;
    width: 100%;
    transition: background 0.2s;
  }
  #banner:hover { background: #234830; }

  .bee { font-size: 1.3rem; flex-shrink: 0; }

  .txt {
    font-family: 'Trebuchet MS', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }

  .btn {
    border: 1.5px solid rgba(232,240,227,0.6);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: #e8f0e3;
    white-space: nowrap;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .txt { font-size: 0.68rem; letter-spacing: 0.06em; }
    #banner { gap: 8px; padding: 11px 12px; }
    .btn { font-size: 0.68rem; padding: 4px 10px; }
  }
</style>
</head>
<body>
  <a id="banner"
     href="https://hummingbirdnatives.github.io/Garden-Maps/garden-chooser.html"
     target="_blank">
    <span class="bee">🐝</span>
    <span class="txt">Explore Our Demonstration Garden Interactive Maps</span>
    <span class="btn">View Maps →</span>
  </a>
</body>
</html>
